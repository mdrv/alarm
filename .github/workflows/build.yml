name: Build AArch64 Arch Repo

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Update PKGBUILDs from Git Releases"]
    types: [completed]
    branches: [main]

concurrency:
  group: aarch64-repo
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04-arm
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v4

    - name: Get runner user UID/GID
      id: user
      run: |
        echo "uid=$(id -u)" >> $GITHUB_OUTPUT
        echo "gid=$(id -g)" >> $GITHUB_OUTPUT

    - name: Build packages in Arch Linux ARM container
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/work \
          -w /work \
          -e HOST_UID="${{ steps.user.outputs.uid }}" \
          -e HOST_GID="${{ steps.user.outputs.gid }}" \
          --entrypoint /bin/bash \
          ghcr.io/menci/archlinuxarm:base-devel \
          -c "pacman -Syu --noconfirm nushell && nu /work/.github/scripts/build-aarch64.nu"

    - name: Generate HTML indexes
      run: |
        # Download web-indexer for ARM64
        curl -fsSL https://github.com/joshbeard/web-indexer/releases/download/0.9.0/web-indexer_0.9.0_linux_arm64.tar.gz -o web-indexer.tar.gz
        tar -xzf web-indexer.tar.gz web-indexer
        chmod +x web-indexer
        
        # Prepare public directory with built packages
        mkdir -p public
        cp -a aarch64 public/
        
        # Generate HTML indexes
        # We index the files within the public directory so links are relative to the site root
        ./web-indexer --source public --target public --theme nord --dirs-first --title "Index of /"
        ./web-indexer --source public/aarch64 --target public/aarch64 --theme nord --dirs-first --title "Index of /aarch64"

        echo "Index files generated and packages copied to public/"

    - name: Upload build artifacts
      if: success() || (failure() && hashFiles('public/**') != '')
      uses: actions/upload-artifact@v4
      with:
        name: aarch64-packages
        path: public/
        retention-days: 7
        if-no-files-found: error

    - name: Upload Pages artifact
      if: github.event_name != 'workflow_run' || github.event.workflow_run.head_branch == 'main'
      uses: actions/upload-pages-artifact@v3
      with:
        path: public

  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.head_branch == 'main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
