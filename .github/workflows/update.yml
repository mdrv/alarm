name: Update AUR Packages from Git Releases

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    permissions:
      contents: write

    steps:
      - name: Setup system
        run: |
          pacman -Sy --noconfirm pacman-contrib nushell git openssh rsync
          # Create non-root user for makepkg (refuses to run as root)
          useradd -m -G wheel builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set permissions for builder
        run: chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Setup SSH for AUR
        run: |
          mkdir -p /home/builder/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > /home/builder/.ssh/id_rsa
          chmod 600 /home/builder/.ssh/id_rsa
          chown -R builder:builder /home/builder/.ssh
          ssh-keyscan -H aur.archlinux.org >> /home/builder/.ssh/known_hosts 2>/dev/null || true

      - name: Update packages
        run: su - builder -c "cd '$GITHUB_WORKSPACE' && nu update.nu"
